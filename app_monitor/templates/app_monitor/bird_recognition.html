{% extends "admin/base_site.html" %}
{% load static %}

{% block title %}水鸟识别{% endblock %}

{% block extrastyle %}
{{ block.super }}
<style>
    .bird-recognition-container { padding: 20px; }
    .upload-area {
        border: 2px dashed #ccc;
        padding: 30px;
        text-align: center;
        margin: 20px 0;
        cursor: pointer;
        border-radius: 4px;
        background-color: #f8f9fa;
    }
    .upload-area:hover { background-color: #e9ecef; }
    #preview-container {
        position: relative;
        display: inline-block;
        margin: 20px 0;
    }
    #preview {
        max-width: 100%;
        max-height: 500px;
        display: none;
    }
    #canvas {
        position: absolute;
        top: 0;
        left: 0;
        pointer-events: none;
        width: 100%;
        height: 100%;
    }
    .result-item {
        background: #f8f9fa;
        margin-bottom: 10px;
        padding: 10px;
        border-radius: 4px;
        border-left: 4px solid #28a745;
    }
    .btn-recognize {
        background-color: #28a745;
        color: white;
        border: none;
        padding: 10px 20px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 16px;
    }
    .btn-recognize:disabled {
        background-color: #ccc;
        cursor: not-allowed;
    }
    #status { margin: 10px 0; color: #666; }
</style>
{% endblock %}

{% block content %}
<div class="bird-recognition-container">
    <h1>🦆 水鸟识别实时检测</h1>
    
    <div class="upload-area" id="dropArea">
        <p>点击或拖拽图片到此区域</p>
        <input type="file" id="fileInput" accept="image/*" style="display: none;">
    </div>
    
    <div style="text-align: center;">
        <button class="btn-recognize" id="recognizeBtn" disabled>开始识别</button>
    </div>
    
    <div id="status"></div>
    
    <div id="preview-container" style="text-align: center;">
        <img id="preview" src="#" alt="预览图">
        <canvas id="canvas"></canvas>
    </div>
    
    <div id="results"></div>
</div>

<script>
    const dropArea = document.getElementById('dropArea');
    const fileInput = document.getElementById('fileInput');
    const preview = document.getElementById('preview');
    const canvas = document.getElementById('canvas');
    const recognizeBtn = document.getElementById('recognizeBtn');
    const statusDiv = document.getElementById('status');
    const resultsDiv = document.getElementById('results');

    let selectedFile = null;

    dropArea.addEventListener('click', () => fileInput.click());
    dropArea.addEventListener('dragover', (e) => { e.preventDefault(); dropArea.style.background = '#eef'; });
    dropArea.addEventListener('dragleave', () => dropArea.style.background = '#f8f9fa');

    fileInput.addEventListener('change', handleFileSelect);
    dropArea.addEventListener('drop', (e) => {
        e.preventDefault();
        dropArea.style.background = '#f8f9fa';
        const file = e.dataTransfer.files[0];
        if (file && file.type.startsWith('image/')) {
            fileInput.files = e.dataTransfer.files;
            handleFileSelect();
        }
    });

    function handleFileSelect() {
        const file = fileInput.files[0];
        if (!file) return;
        selectedFile = file;

        const reader = new FileReader();
        reader.onload = (e) => {
            preview.src = e.target.result;
            preview.style.display = 'block';
            canvas.width = 0;
            canvas.height = 0;
        };
        reader.readAsDataURL(file);
        recognizeBtn.disabled = false;
        statusDiv.innerText = '已选择图片，点击识别';
    }

    recognizeBtn.addEventListener('click', async () => {
        if (!selectedFile) return;

        recognizeBtn.disabled = true;
        statusDiv.innerText = '正在识别中...';
        resultsDiv.innerHTML = '';

        const formData = new FormData();
        formData.append('image', selectedFile);

        try {
            const response = await fetch('/bird/recognize/', {
                method: 'POST',
                body: formData
            });

            if (!response.ok) {
                const errorText = await response.text();
                throw new Error(`服务器错误 (${response.status}): ${errorText}`);
            }

            const data = await response.json();
            statusDiv.innerText = `识别完成，发现 ${data.results.length} 个目标`;
            displayResults(data.results);
            drawBoxes(data.results);
        } catch (error) {
            statusDiv.innerText = '识别失败: ' + error.message;
        } finally {
            recognizeBtn.disabled = false;
        }
    });

    function displayResults(results) {
        if (results.length === 0) {
            resultsDiv.innerHTML = '<p>未检测到水鸟</p>';
            return;
        }
        let html = '<h3>检测结果：</h3>';
        results.forEach((r, idx) => {
            html += `
                <div class="result-item">
                    <strong>目标 ${idx+1}</strong><br>
                    检测框: [${r.detection_bbox.join(', ')}]<br>
                    检测置信度: ${(r.detection_confidence * 100).toFixed(1)}%<br>
                    细分类别ID: ${r.fine_class_id}<br>
                    细分类别置信度: ${(r.fine_confidence * 100).toFixed(1)}%
                </div>
            `;
        });
        resultsDiv.innerHTML = html;
    }

    function drawBoxes(results) {
        if (!preview.complete || preview.naturalWidth === 0) return;

        canvas.width = preview.naturalWidth;
        canvas.height = preview.naturalHeight;
        canvas.style.width = preview.clientWidth + 'px';
        canvas.style.height = preview.clientHeight + 'px';

        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = '#00ff00';
        ctx.lineWidth = 3;
        ctx.font = 'bold 16px Arial';
        ctx.fillStyle = '#00ff00';

        results.forEach((r) => {
            const [x1, y1, x2, y2] = r.detection_bbox;
            ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
            ctx.fillText(`${r.fine_class_id} (${(r.detection_confidence*100).toFixed(0)}%)`, x1, y1-5);
        });
    }
</script>
{% endblock %}
